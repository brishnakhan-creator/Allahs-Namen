body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0a0a0f 0%, #0f1a2e 50%, #0a1628 100%);
  font-family: Georgia, 'Times New Roman', serif;
  color: #e8d5b0;
  padding: 2rem 1rem;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.5); }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

.star {
  position: fixed;
  width: 2px; height: 2px;
  border-radius: 50%;
  background: rgba(212,175,55,0.6);
  pointer-events: none;
  animation: twinkle 3s ease-in-out infinite;
}

.container {
  max-width: 640px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.header {
  text-align: center;
  margin-bottom: 2.5rem;
  animation: fadeInUp 0.8s ease forwards;
}

.arabic-title {
  font-size: 2.8rem;
  background: linear-gradient(135deg, #d4af37, #f5d76e, #c9971c);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 3s linear infinite;
  letter-spacing: 0.05em;
  margin-bottom: 0.5rem;
}

.subtitle {
  font-size: 1.1rem;
  font-weight: normal;
  color: #c9b08a;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}

.divider {
  width: 80px; height: 1px;
  background: linear-gradient(90deg, transparent, #d4af37, transparent);
  margin: 0.8rem auto;
}

.intro {
  color: rgba(232,213,176,0.6);
  font-size: 0.95rem;
  line-height: 1.7;
  max-width: 480px;
  margin: 0 auto;
}

.input-box {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(212,175,55,0.2);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  animation: fadeInUp 0.8s ease 0.2s forwards;
  opacity: 0;
}

label {
  display: block;
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #d4af37;
  margin-bottom: 0.75rem;
}

textarea {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(212,175,55,0.15);
  border-radius: 10px;
  padding: 0.9rem 1rem;
  color: #e8d5b0;
  font-size: 0.95rem;
  line-height: 1.7;
  resize: none;
  font-family: Georgia, serif;
  transition: border-color 0.3s;
}
textarea:focus { outline: none; border-color: rgba(212,175,55,0.6); }
textarea::placeholder { color: rgba(232,213,176,0.35); }

button {
  margin-top: 1rem;
  width: 100%;
  padding: 0.9rem;
  background: linear-gradient(135deg, #c9971c, #d4af37);
  border: none;
  border-radius: 10px;
  color: #0a0a0f;
  font-size: 0.95rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  font-family: Georgia, serif;
  font-weight: bold;
  transition: all 0.3s ease;
}
button:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(212,175,55,0.4); }
button:disabled {
  background: rgba(212,175,55,0.15);
  color: rgba(232,213,176,0.4);
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.error {
  background: rgba(180,60,60,0.15);
  border: 1px solid rgba(180,60,60,0.3);
  border-radius: 10px;
  padding: 1rem;
  color: #f0a0a0;
  text-align: center;
  margin-bottom: 1rem;
}

.results-label {
  text-align: center;
  margin-bottom: 1.2rem;
  color: rgba(212,175,55,0.7);
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.name-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(212,175,55,0.2);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1rem;

  overflow: hidden;
  animation: fadeInUp 0.6s ease forwards;
  opacity: 0;

.name-card:nth-child(1) { animation-delay: 0.1s; }

.card-top-line {

}

.card-arabic {
  font-size: 2.2rem;
  text-align: center;
  color: #d4af37;
  margin-bottom: 0.3rem;
  line-height: 1.4;

.card-names {
  text-align: center;

.card-dot { color: rgba(212,175,55,0.4); margin: 0 0.6rem; }
.card-german { font-style: italic; color: #e8d5b0; }

.card-divider {
  width: 40px; height: 1px;

}

  line-height: 1.75;

  text-align: center;
  margin-bottom: 1rem;

.prayer-box {
  background: rgba(212,175,55,0.07);
  border: 1px solid rgba(212,175,55,0.15);
  border-radius: 8px;
  padding: 0.75rem 1rem;
}
.prayer-label {
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #d4af37;
  display: block;
  margin-bottom: 0.35rem;
}
.prayer-text {
  font-size: 0.88rem;
  color: rgba(232,213,176,0.75);
  font-style: italic;
  line-height: 1.6;
}

.footer-note {
  text-align: center;
  margin-top: 1.5rem;
  padding: 1rem;
  color: rgba(212,175,55,0.5);
  font-size: 0.85rem;
  font-style: italic;
  line-height: 1.7;
}

.loading-dots::after {
  content: '';
  animation: dots 1.5s steps(4, end) infinite;
}
@keyframes dots {
  0%   { content: ''; }
  25%  { content: '.'; }
  50%  { content: '..'; }
  75%  { content: '...'; }
}

  </div>

  <script>
    const SYSTEM_PROMPT = `Du bist eine einfühlsame spirituelle Begleiterin für muslimische Mädchen im Alter von 13–17 Jahren. Du kennst alle 99 Namen Allahs (Asma ul-Husna) auf Arabisch und Deutsch.

Wenn ein Mädchen dir eine Situation oder ein Gefühl beschreibt, schlägst du 2–3 passende Namen Allahs vor.

Für jeden Namen gibst du aus:
1. Den arabischen Namen (z.B. الرحمن)
2. Die arabische Aussprache (z.B. Ar-Rahman)
3. Die deutsche Bedeutung (z.B. Der Allerbarmende)
4. Eine einfühlsame, altersgerechte Erklärung (2–3 Sätze), warum dieser Name gerade zu der beschriebenen Situation passt
5. Einen kurzen Tipp, wie man diesen Namen im Gebet verwenden kann (z.B. "Du kannst in deinem Dua sagen: Ya Rahman, erbarme dich über mich...")

Antworte NUR im folgenden JSON-Format, ohne Markdown-Backticks oder Präambel:
{"names":[{"arabic":"الرحمن","transliteration":"Ar-Rahman","german":"Der Allerbarmende","explanation":"...","prayer_tip":"..."}]}`;

    async function findNames() {
      const situation = document.getElementById('situation').value.trim();
      if (!situation) return;

      const btn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('error');
      const resultsDiv = document.getElementById('results');
      const cardsDiv = document.getElementById('cards');

      btn.disabled = true;
      btn.innerHTML = '✦ Suche passende Namen <span class="loading-dots"></span>';
      errorDiv.style.display = 'none';
      resultsDiv.style.display = 'none';
      cardsDiv.innerHTML = '';

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: SYSTEM_PROMPT,
            messages: [{ role: 'user', content: situation }]
          })
        });

        const data = await response.json();
        const text = data.content.map(i => i.text || '').join('');
        const clean = text.replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(clean);

        parsed.names.forEach(name => {
          cardsDiv.innerHTML += `
            <div class="name-card">
              <div class="card-top-line"></div>
              <div class="card-arabic">${name.arabic}</div>
              <div class="card-names">
                <span class="card-transliteration">${name.transliteration}</span>
                <span class="card-dot">·</span>
                <span class="card-german">${name.german}</span>
              </div>
              <div class="card-divider"></div>
              <p class="card-explanation">${name.explanation}</p>
              <div class="prayer-box">
                <span class="prayer-label">🤲 Im Gebet verwenden</span>
                <span class="prayer-text">${name.prayer_tip}</span>
              </div>
            </div>`;
        });

        resultsDiv.style.display = 'block';
      } catch (err) {
        errorDiv.textContent = 'Es gab einen Fehler. Bitte versuche es nochmal.';
        errorDiv.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '✦ Namen finden';
      }
    }

    // Allow Enter+Shift for newline, Enter alone to submit
    document.getElementById('situation').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        findNames();
      }
    });
  </script>
